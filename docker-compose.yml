services:
  web:
    build: .
    ports:
      - "8081:80"
    volumes:
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./backend
    restart: unless-stopped
    volumes:
      - vocab_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  vocab_data:
